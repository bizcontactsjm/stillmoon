<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>소개 — stillmoon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6fa;
      --white: #ffffff;
      --ink: #0d0f14;
      --sub: #2e3340;
      --muted: #8a93a8;
      --border: #dce1ed;
      --accent: #2a5bd7;
      --accent-light: #e8eef9;
    }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 48px 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--white);
      border: 1px solid var(--border);
      padding: 56px 40px 48px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .back {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back:hover { color: var(--accent); }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .name-sub {
      font-size: 12px;
      letter-spacing: 0.16em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 32px;
    }

    .about-text {
      font-size: 13.5px;
      line-height: 2.1;
      color: var(--sub);
      letter-spacing: 0.02em;
      margin-bottom: 36px;
      width: 100%;
      word-break: keep-all;
    }

    .about-text em {
      font-style: normal;
      color: var(--ink);
    }

    /* Certs */
    .certs {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 36px;
    }

    .cert {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 5px 12px;
      background: var(--bg);
    }

    /* Tools */
    .tools-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .tools {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 40px;
    }

    .tool-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .tool-name {
      font-size: 12.5px;
      letter-spacing: 0.04em;
      color: var(--sub);
      min-width: 110px;
    }

    .tool-bar-bg {
      flex: 1;
      height: 2px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .tool-bar-fill {
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 1.1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .tool-level {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      min-width: 52px;
      text-align: right;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 16px 22px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink);
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .back-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .back-btn:hover::before { transform: scaleX(1); }
    .back-btn:hover { color: var(--white); border-color: var(--accent); }
    .back-btn span { position: relative; z-index: 1; }

    .footer {
      margin-top: 40px;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--border);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <a class="back" href="index.html">← back</a>

    <span class="section-label">About</span>
    <h1 class="name">stillmoon</h1>
    <p class="name-sub">문소정 · Video Editor</p>

    <div class="divider"></div>

    <p class="about-text">
      안녕하세요, 영상편집자 <em>문소정</em>입니다.<br><br>
      한 컷에도 감정이 담긴다고 믿기에,
      전하고 싶은 이야기가 온전히 전달될 수 있도록
      <em>세심하게, 그리고 끝까지 성실하게</em> 작업하고 있습니다.
    </p>

    <div class="certs">
      <span class="cert">컴퓨터그래픽기능사</span>
      <span class="cert">GTQ (Photoshop)</span>
      <span class="cert">GTQ (Illustrator)</span>
    </div>

    <span class="tools-label">Tools</span>
    <div class="tools" id="tools">
      <div class="tool-row">
        <span class="tool-name">Premiere Pro</span>
        <div class="tool-bar-bg"><div class="tool-bar-fill" data-width="88"></div></div>
        <span class="tool-level">Main</span>
      </div>
      <div class="tool-row">
        <span class="tool-name">After Effects</span>
        <div class="tool-bar-bg"><div class="tool-bar-fill" data-width="65"></div></div>
        <span class="tool-level">Motion</span>
      </div>
      <div class="tool-row">
        <span class="tool-name">Photoshop</span>
        <div class="tool-bar-bg"><div class="tool-bar-fill" data-width="75"></div></div>
        <span class="tool-level">Graphic</span>
      </div>
      <div class="tool-row">
        <span class="tool-name">Illustrator</span>
        <div class="tool-bar-bg"><div class="tool-bar-fill" data-width="62"></div></div>
        <span class="tool-level">Graphic</span>
      </div>
    </div>

    <a class="back-btn" href="index.html">
      <span>← Home</span>
      <span style="opacity:0.4; font-size:13px; position:relative; z-index:1; letter-spacing:0.1em;">stillmoon</span>
    </a>
  </div>

  <p class="footer">stillmoon</p>

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.querySelectorAll('.tool-bar-fill').forEach(el => {
          el.style.width = el.dataset.width + '%';
        });
      }, 500);
    });
  </script>
</body>
</html>
