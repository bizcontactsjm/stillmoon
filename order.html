<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>의뢰하기 — stillmoon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6fa;
      --white: #ffffff;
      --ink: #0d0f14;
      --sub: #2e3340;
      --muted: #8a93a8;
      --border: #dce1ed;
      --accent: #2a5bd7;
      --accent-light: #e8eef9;
      --kakao: #FEE500;
      --kakao-ink: #191919;
    }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 48px 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--white);
      border: 1px solid var(--border);
      padding: 56px 40px 48px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .back {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back:hover { color: var(--accent); }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 12.5px;
      color: var(--muted);
      letter-spacing: 0.03em;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 32px;
    }

    .form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.hidden { display: none; }

    .label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--sub);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .required { color: var(--accent); font-size: 14px; line-height: 1; }
    .optional { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: none; }

    input[type="text"],
    input[type="email"],
    textarea,
    select {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 300;
      letter-spacing: 0.02em;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      background: var(--white);
    }

    input::placeholder, textarea::placeholder { color: var(--muted); font-weight: 300; }
    textarea { resize: vertical; min-height: 90px; line-height: 1.7; }

    /* Select */
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '↓';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--muted);
      pointer-events: none;
    }
    select { cursor: pointer; padding-right: 36px; }
    select option { background: var(--white); color: var(--ink); }

    /* Client type toggle */
    .type-toggle {
      display: flex;
      width: 100%;
    }
    .type-toggle input[type="radio"] { display: none; }
    .type-toggle label {
      flex: 1;
      text-align: center;
      padding: 12px;
      font-size: 13px;
      letter-spacing: 0.06em;
      color: var(--muted);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .type-toggle label:first-of-type { border-right: none; }
    .type-toggle input:checked + label {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--white);
    }

    /* Chips */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip input[type="checkbox"] { display: none; }
    .chip label {
      display: block;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .chip input:checked + label {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--white);
    }
    .chip label:hover { border-color: var(--accent); color: var(--accent); }

    /* Reference fields */
    .ref-fields { display: flex; flex-direction: column; gap: 8px; }
    .ref-row { display: flex; align-items: center; gap: 8px; }
    .ref-row input { flex: 1; }
    .ref-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      color: var(--muted);
      min-width: 16px;
      text-align: center;
    }

    /* Budget */
    .budget-wrap { position: relative; }
    .budget-wrap input { padding-right: 40px; }
    .budget-unit {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--muted);
      pointer-events: none;
    }

    /* Note box */
    .note-box {
      width: 100%;
      border-left: 2px solid var(--accent);
      background: var(--accent-light);
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .note-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 12px;
      color: var(--sub);
      line-height: 1.6;
      letter-spacing: 0.02em;
    }

    .note-dot { color: var(--accent); font-size: 16px; line-height: 1.3; flex-shrink: 0; }

    /* Kakao button inside note */
    .kakao-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 13px 18px;
      background: var(--kakao);
      border: none;
      color: var(--kakao-ink);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.06em;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
      margin-top: 4px;
    }
    .kakao-btn:hover { opacity: 0.88; }

    .kakao-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Submit */
    .submit-btn {
      width: 100%;
      padding: 17px 22px;
      border: none;
      background: var(--accent);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Success */
    .success {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 24px 0;
      gap: 16px;
      width: 100%;
    }
    .success-icon { font-size: 32px; }
    .success-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      color: var(--ink);
    }
    .success-text { font-size: 13px; color: var(--muted); line-height: 1.8; letter-spacing: 0.02em; }
    .success-back {
      margin-top: 8px;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
    }

    .footer {
      margin-top: 40px;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--border);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <a class="back" href="index.html">← back</a>

    <span class="section-label">Request</span>
    <h1 class="title">의뢰하기</h1>
    <p class="subtitle">아래 양식을 작성해 주시면<br>확인 후 빠르게 연락드릴게요 :)</p>

    <div class="divider"></div>

    <div class="form" id="form">

      <!-- 의뢰 유형 -->
      <div class="field">
        <label class="label">의뢰 유형 <span class="required">·</span></label>
        <div class="type-toggle">
          <input type="radio" name="client-type" id="type-personal" value="개인" checked>
          <label for="type-personal">개인</label>
          <input type="radio" name="client-type" id="type-business" value="업체">
          <label for="type-business">업체</label>
        </div>
      </div>

      <!-- 개인 전용 -->
      <div class="field" id="field-name-personal">
        <label class="label">이름 <span class="required">·</span></label>
        <input type="text" id="name-personal" placeholder="홍길동" />
      </div>

      <!-- 업체 전용 -->
      <div class="field hidden" id="field-company">
        <label class="label">업체명 <span class="required">·</span></label>
        <input type="text" id="company" placeholder="회사명 또는 브랜드명" />
      </div>

      <div class="field hidden" id="field-name-business">
        <label class="label">담당자명 <span class="required">·</span></label>
        <input type="text" id="name-business" placeholder="홍길동" />
      </div>

      <!-- 공통 -->
      <div class="field">
        <label class="label">전화번호 <span class="required">·</span></label>
        <input type="text" id="phone" placeholder="010-0000-0000" maxlength="13" />
      </div>

      <div class="field">
        <label class="label">이메일 주소 <span class="required">·</span></label>
        <input type="email" id="email" placeholder="example@email.com" />
      </div>

      <!-- 작업 종류 -->
      <div class="field">
        <label class="label">작업 종류 <span class="required">·</span></label>
        <div class="chips">
          <div class="chip"><input type="checkbox" id="t1" name="type" value="유튜브 편집"><label for="t1">유튜브 편집</label></div>
          <div class="chip"><input type="checkbox" id="t2" name="type" value="브이로그"><label for="t2">브이로그</label></div>
          <div class="chip"><input type="checkbox" id="t3" name="type" value="숏폼"><label for="t3">숏폼</label></div>
          <div class="chip"><input type="checkbox" id="t4" name="type" value="웨딩"><label for="t4">웨딩</label></div>
          <div class="chip"><input type="checkbox" id="t5" name="type" value="인터뷰"><label for="t5">인터뷰</label></div>
          <div class="chip"><input type="checkbox" id="t6" name="type" value="업체/상품 홍보 롱폼"><label for="t6">업체/상품 홍보 롱폼</label></div>
        </div>
      </div>

      <!-- 원본 영상 길이 -->
      <div class="field">
        <label class="label">원본 영상 길이 <span class="required">·</span></label>
        <div class="select-wrap">
          <select id="raw-length">
            <option value="" disabled selected>선택해 주세요</option>
            <option>10분 이내</option>
            <option>10 – 30분</option>
            <option>30분 – 1시간</option>
            <option>1 – 2시간</option>
            <option>2시간 이상</option>
            <option>미정 / 모르겠어요</option>
          </select>
        </div>
      </div>

      <!-- 최종 영상 길이 -->
      <div class="field">
        <label class="label">최종 영상 길이 <span class="required">·</span></label>
        <div class="select-wrap">
          <select id="final-length">
            <option value="" disabled selected>선택해 주세요</option>
            <option>1분 이내 (숏폼)</option>
            <option>1 – 5분</option>
            <option>5 – 10분</option>
            <option>10 – 20분</option>
            <option>20분 이상</option>
            <option>미정 / 협의</option>
          </select>
        </div>
      </div>

      <!-- 레퍼런스 -->
      <div class="field">
        <label class="label">레퍼런스 <span class="required">·</span> <span class="optional">최대 3개, 1개 필수</span></label>
        <div class="ref-fields">
          <div class="ref-row">
            <span class="ref-num">1</span>
            <input type="text" id="ref1" placeholder="참고 영상 링크 또는 채널명 (필수)" />
          </div>
          <div class="ref-row">
            <span class="ref-num">2</span>
            <input type="text" id="ref2" placeholder="선택" />
          </div>
          <div class="ref-row">
            <span class="ref-num">3</span>
            <input type="text" id="ref3" placeholder="선택" />
          </div>
        </div>
      </div>

      <!-- 예산 -->
      <div class="field">
        <label class="label">예산 <span class="optional">(대략적인 금액도 괜찮아요)</span></label>
        <div class="budget-wrap">
          <input type="text" id="budget" placeholder="예: 150,000" inputmode="numeric" />
          <span class="budget-unit">원</span>
        </div>
      </div>

      <!-- 추가 요청사항 -->
      <div class="field">
        <label class="label">추가 요청사항 <span class="optional">(선택)</span></label>
        <textarea id="note-text" placeholder="원하시는 분위기, 마감일, 기타 요청사항을 자유롭게 적어주세요"></textarea>
      </div>

      <!-- 안내 -->
      <div class="note-box">
        <div class="note-row">
          <span class="note-dot">·</span>
          <span>접수 후 <strong style="font-weight:400; color:var(--ink)">1–2일 이내</strong> 이메일로 견적서를 발송해 드립니다</span>
        </div>
        <div class="note-row">
          <span class="note-dot">·</span>
          <span>단가는 작업 내용 검토 후 개별 안내드립니다</span>
        </div>
        <div class="note-row">
          <span class="note-dot">·</span>
          <span>견적 의뢰 전 간단한 문의는 카카오톡으로 상담 가능합니다</span>
        </div>
        <a class="kakao-btn" href="https://open.kakao.com/o/sdOP0Pmi" target="_blank" rel="noopener">
          <svg class="kakao-icon" viewBox="0 0 24 24" fill="var(--kakao-ink)">
            <path d="M12 3C6.477 3 2 6.477 2 10.5c0 2.613 1.638 4.912 4.13 6.26-.181.677-.657 2.454-.752 2.835-.118.476.174.47.366.342.151-.1 2.395-1.624 3.365-2.284.614.088 1.243.134 1.891.134 5.523 0 10-3.477 10-7.787C22 6.477 17.523 3 12 3z"/>
          </svg>
          카카오톡으로 문의하기
        </a>
      </div>

      <button class="submit-btn" onclick="handleSubmit()">의뢰 신청하기 →</button>
    </div>

    <!-- Success -->
    <div class="success" id="success">
      <div class="success-icon">🌙</div>
      <h2 class="success-title">신청이 완료됐어요</h2>
      <p class="success-text">작성해 주신 내용을 확인하고<br>1–2일 이내 이메일로 견적서를 보내드릴게요.<br>감사합니다 :)</p>
      <a class="success-back" href="index.html">← 홈으로 돌아가기</a>
    </div>
  </div>

  <p class="footer">stillmoon</p>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxK6GTvBXLxbFs1GTlLmqvyJhZ__q7O9-N0jqiV1_j4gYmnzukCYCOH--AgUU1-UL9v/exec';

    // 개인 / 업체 토글
    document.querySelectorAll('input[name="client-type"]').forEach(radio => {
      radio.addEventListener('change', function () {
        const isBusiness = this.value === '업체';
        document.getElementById('field-name-personal').classList.toggle('hidden', isBusiness);
        document.getElementById('field-company').classList.toggle('hidden', !isBusiness);
        document.getElementById('field-name-business').classList.toggle('hidden', !isBusiness);
      });
    });

    // 전화번호 자동 하이픈
    document.getElementById('phone').addEventListener('input', function (e) {
      let val = e.target.value.replace(/\D/g, '');
      if (val.length <= 3) e.target.value = val;
      else if (val.length <= 7) e.target.value = val.slice(0,3) + '-' + val.slice(3);
      else e.target.value = val.slice(0,3) + '-' + val.slice(3,7) + '-' + val.slice(7,11);
    });

    // 예산 천단위 콤마
    document.getElementById('budget').addEventListener('input', function (e) {
      let val = e.target.value.replace(/[^0-9]/g, '');
      if (val) e.target.value = parseInt(val).toLocaleString('ko-KR');
      else e.target.value = '';
    });

    async function handleSubmit() {
      const clientType = document.querySelector('input[name="client-type"]:checked').value;
      const isBusiness = clientType === '업체';

      const name = isBusiness
        ? document.getElementById('name-business').value.trim()
        : document.getElementById('name-personal').value.trim();
      const company = isBusiness ? document.getElementById('company').value.trim() : '';
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const types = [...document.querySelectorAll('input[name="type"]:checked')].map(e => e.value).join(', ');
      const rawLength = document.getElementById('raw-length').value;
      const finalLength = document.getElementById('final-length').value;
      const ref1 = document.getElementById('ref1').value.trim();
      const ref2 = document.getElementById('ref2').value.trim();
      const ref3 = document.getElementById('ref3').value.trim();
      const budget = document.getElementById('budget').value.trim();
      const note = document.getElementById('note-text').value.trim();

      if (isBusiness && !company) { alert('업체명을 입력해 주세요.'); return; }
      if (!name) { alert(isBusiness ? '담당자명을 입력해 주세요.' : '이름을 입력해 주세요.'); return; }
      if (!phone || phone.length < 12) { alert('전화번호를 정확히 입력해 주세요.'); return; }
      if (!email) { alert('이메일 주소를 입력해 주세요.'); return; }
      if (!types) { alert('작업 종류를 하나 이상 선택해 주세요.'); return; }
      if (!rawLength) { alert('원본 영상 길이를 선택해 주세요.'); return; }
      if (!finalLength) { alert('최종 영상 길이를 선택해 주세요.'); return; }
      if (!ref1) { alert('레퍼런스를 1개 이상 입력해 주세요.'); return; }

      const btn = document.querySelector('.submit-btn');
      btn.textContent = '전송 중...';
      btn.disabled = true;

      try {
        await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ clientType, company, name, phone, email, types, rawLength, finalLength, ref1, ref2, ref3, budget, note })
        });

        document.getElementById('form').style.display = 'none';
        document.getElementById('success').style.display = 'flex';

      } catch (err) {
        alert('전송 중 오류가 발생했어요. 잠시 후 다시 시도해 주세요.');
        btn.textContent = '의뢰 신청하기 →';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
